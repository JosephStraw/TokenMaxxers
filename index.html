<!DOCTYPE html>
<html>
<head>
    <title>Token Maxxer's Holiday Tycoon</title>
    <link  rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double:wght@100..900&family=VT323&display=swap" rel="stylesheet">
</head>

<body>
<header>
    <h1>Token Maxxer's Holdiay Tycoon</h1>
</header>

<script src="https://unpkg.com/kaboom/dist/kaboom.js"></script>
<script src="src/game.js"></script>

    <footer>
        <ul class="ul-style ul-menuV">
            <li class="li-style" id="eco-score">Environmental: <p class="values" id="eco-score-value">0</p></li>
            <li class="li-style" id="money-score">Money: £<p class="values" id="money-score-value">0</p></li>
            <li class="li-style" id="pop-score">Population: <p class="values" id="pop-score-value">0</p></li>
            <li class="li-style" id="tax-score">Tax: £<p class="values" id="tax-score-value">0</p></li>
        </ul>
        <ul class="ul-style ul-menuH">
            <li class="li-style" id="eco-Lodge"><img class="building" src="assets/EcoFriendlyLodge.png" alt="Eco Lodge"></li>
            <li class="li-style" id="def-Lodge"><img class="building" src="assets/NormalLodge.png" alt="Lodge"></li>
            <li class="li-style" id="pol-Lodge"><img class="building" src="assets/PolluterLodge.png" alt="Polluting Lodge"></li>
        </ul>
        <ul class="ul-style ul-menuH">
            <li class="li-style" id="eco-Shop"><img class="building" src="assets/EcoFriendlyShop.png" alt="Eco Shop"></li>
            <li class="li-style" id="def-Shop"><img class="building" src="assets/NormalShop.png" alt="Normal Shop"></li>
            <li class="li-style" id="pol-Shop"><img class="building" src="assets/PolluterShop.png" alt="Polluting Shop"></li>
        </ul>
        <ul class="ul-style ul-menuH">
            <li class="li-style" id="eco-Transport"><img class="building" src="assets/EcoFriendlyTransport.png" alt="Eco Transport"></li>
            <li class="li-style" id="def-Transport"><img class="building" src="assets/NormalTransport.png" alt="Normal Transport"></li>
            <li class="li-style" id="pol-Transport"><img class="building" src="assets/PolluterTransport.png" alt="Polluting Transport"></li>
        </ul>
        <ul class="ul-style ul-menuH">
<li class="li-style" id="bulldozer"><img class="building" src="assets/Bulldozer.png" alt="💣"></li>
        </ul>
    </footer>
</body>
</html>
